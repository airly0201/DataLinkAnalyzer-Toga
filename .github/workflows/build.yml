name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install Briefcase
      run: |
        pip install briefcase
    
    - name: Build Android APK
      run: |
        briefcase build android -C -v
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DataLinkAnalyzer.apk
        path: build/android/gradle/app/build/outputs/apk/debug/*.apk
