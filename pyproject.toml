[tool.briefcase]
project_name = "DataLinkAnalyzer"
bundle = "com.datalink"
version = "1.0.0"
description = "数据关联分析平台 - DataLink Analyzer"
icon = "src/DataLinkAnalyzer/resources/DataLinkAnalyzer"

[tool.briefcase.app.android]
formal_name = "DataLinkAnalyzer"
sources = ["src/DataLinkAnalyzer"]
requires = [
    "starlette>=0.27.0",
    "uvicorn[standard]>=0.23.0",
    "pandas>=2.0.0",
    "openpyxl>=3.1.0",
    "plotly>=5.18.0",
    "python-multipart>=0.0.6",
    "jinja2>=3.1.0",
]

[tool.briefcase.app.android.launch_screen]
splash_background_color = "#4A90D9"
splash_image = "src/DataLinkAnalyzer/resources/splash"
splash_color = "#FFFFFF"

[tool.briefcase.app.android.permissions]
INTERNET = true
ACCESS_NETWORK_STATE = true

[tool.briefcase.build]
android = {
    "identity_name": "com.datalink.analyzer",
    "product_name": "DataLinkAnalyzer",
}